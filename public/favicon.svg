<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="m">
      <rect width="100" height="100" fill="white"/>
      <!-- inner hexagon cutout for depth effect -->
      <polygon points="50,28 68,38 68,62 50,72 32,62 32,38" fill="black"/>
    </mask>
  </defs>

  <!-- Outer hexagon -->
  <polygon
    points="50,10 85,30 85,70 50,90 15,70 15,30"
    fill="none"
    stroke="#7B61FF"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Inner depth lines (masked to the ring between outer and inner hexagon) -->
  <g mask="url(#m)" stroke="#7B61FF" stroke-width="2.5" opacity="0.5">
    <line x1="50" y1="10" x2="50" y2="28"/>
    <line x1="85" y1="30" x2="68" y2="38"/>
    <line x1="85" y1="70" x2="68" y2="62"/>
    <line x1="50" y1="90" x2="50" y2="72"/>
    <line x1="15" y1="70" x2="32" y2="62"/>
    <line x1="15" y1="30" x2="32" y2="38"/>
  </g>

  <!-- Inner hexagon -->
  <polygon
    points="50,28 68,38 68,62 50,72 32,62 32,38"
    fill="none"
    stroke="#7B61FF"
    stroke-width="3"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#7B61FF"/>
</svg>
